<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>24時間せいかつリズム時計</title>
    <style>
        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Comic Sans MS', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #eaddca;
            margin: 0;
            padding: 10px;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        #canvasContainer {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1 / 1;
        }
        canvas {
            width: 100%;
            height: 100%;
        }
        .preset-container {
            margin-top: 10px;
            display: flex;
            gap: 15px;
        }
        .btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-bad { background-color: #a13d63; color: white; }
        .btn-good { background-color: #3f7a5c; color: white; }
    </style>
</head>
<body>

    <div id="canvasContainer">
        <canvas id="clockCanvas" width="700" height="700"></canvas>
    </div>

    <div class="preset-container">
        <button class="btn btn-bad" onclick="loadPreset('bad')">✕ わるいリズム(初期データ)</button>
        <button class="btn btn-good" onclick="loadPreset('good')">◯ よいリズム</button>
    </div>

<script>
const canvas = document.getElementById('clockCanvas');
const ctx = canvas.getContext('2d');

const CENTER = { x: 350, y: 350 };
const RADIUS = 230; 
const BASE_ANGLE = -Math.PI / 2; // 真上（12時／24時）

let schedules = [];
let startHourOffset = 0; // 全体の開始絶対時刻

// ==========================================
// ★ 初期時間割の指定（24時間表記）
// ==========================================
const badPresetRaw = [
    { name: 'すいみん',     start: '23:45', end: '07:30', color: '#4c73a4' },
    { name: 'したく・登校', start: '07:30', end: '08:00', color: '#cca625' },
    { name: '学校',         start: '08:00', end: '15:00', color: '#168344' },
    { name: '下校・外遊び', start: '15:00', end: '17:00', color: '#b75c24' },
    { name: '宿題',         start: '17:00', end: '17:30', color: '#592971' },
    { name: 'ゲーム',       start: '17:30', end: '19:00', color: '#9d226e' },
    { name: '夕食',         start: '19:00', end: '19:30', color: '#3fa442' },
    { name: 'テレビ',       start: '19:30', end: '20:30', color: '#9d226e' },
    { name: '入浴',         start: '20:30', end: '21:00', color: '#54a3aa' },
    { name: 'ゲーム',       start: '21:00', end: '23:45', color: '#9d226e' }
];

const goodPresetRaw = [
    { name: 'すいみん',     start: '21:00', end: '06:30', color: '#4c73a4' },
    { name: 'あさごはん',   start: '06:30', end: '07:00', color: '#3fa442' },
    { name: 'したく・登校', start: '07:00', end: '08:00', color: '#cca625' },
    { name: '学校',         start: '08:00', end: '15:00', color: '#168344' },
    { name: '下校・外遊び', start: '15:00', end: '16:30', color: '#b75c24' },
    { name: 'しゅくだい',   start: '16:30', end: '17:30', color: '#592971' },
    { name: 'ゆうはん',     start: '17:30', end: '18:30', color: '#3fa442' },
    { name: 'おふろ',       start: '18:30', end: '19:30', color: '#54a3aa' },
    { name: 'のんびり',     start: '19:30', end: '21:00', color: '#9d226e' }
];

function convertRawToSchedules(rawList) {
    return rawList.map(item => {
        const [sH, sM] = item.start.split(':').map(Number);
        const [eH, eM] = item.end.split(':').map(Number);
        let startDec = sH + sM / 60;
        let endDec = eH + eM / 60;
        let duration = endDec - startDec;
        if (duration <= 0) duration += 24; 
        return { name: item.name, duration: duration, color: item.color };
    });
}

function loadPreset(type) {
    const raw = type === 'bad' ? badPresetRaw : goodPresetRaw;
    const [h, m] = raw[0].start.split(':').map(Number);
    startHourOffset = h + m / 60;
    schedules = convertRawToSchedules(raw);
    draw();
}

loadPreset('bad');

// --- 描画処理 ---
function draw(draggedInfo = null) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#f5eedf';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let currentHour = startHourOffset;

    // 1. 円グラフ（扇形）の描画
    schedules.forEach((s, idx) => {
        let startAngle = BASE_ANGLE + (currentHour / 24) * Math.PI * 2;
        let endAngle = startAngle + (s.duration / 24) * Math.PI * 2;
        
        ctx.beginPath();
        ctx.moveTo(CENTER.x, CENTER.y);
        ctx.arc(CENTER.x, CENTER.y, RADIUS, startAngle, endAngle);
        ctx.closePath();
        
        if (draggedInfo && draggedInfo.type === 'move' && draggedInfo.index === idx) {
            ctx.fillStyle = 'rgba(150, 150, 150, 0.4)';
        } else {
            ctx.fillStyle = s.color;
        }
        ctx.fill();
        
        ctx.strokeStyle = '#f5eedf';
        ctx.lineWidth = 3;
        ctx.stroke();

        // 文字描画
        if (s.duration > 0.24) { 
            ctx.save();
            let textAngle = startAngle + (s.duration / 24) * Math.PI;
            ctx.translate(CENTER.x, CENTER.y);
            ctx.rotate(textAngle);
            
            ctx.fillStyle = (draggedInfo && draggedInfo.type === 'move' && draggedInfo.index === idx) ? 'rgba(0,0,0,0.3)' : 'white';
            ctx.font = 'bold 24px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            if (!(draggedInfo && draggedInfo.type === 'move' && draggedInfo.index === idx)) {
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 6;
            }
            
            let checkAngle = (textAngle - BASE_ANGLE) % (Math.PI * 2);
            if (checkAngle < 0) checkAngle += Math.PI * 2;
            if (checkAngle > Math.PI && checkAngle < Math.PI * 2) {
                ctx.rotate(Math.PI);
                ctx.fillText(s.name, -RADIUS * 0.65, 0);
            } else {
                ctx.fillText(s.name, RADIUS * 0.65, 0);
            }
            ctx.restore();
        }
        currentHour += s.duration;
    });

    if (draggedInfo && draggedInfo.type === 'move' && draggedInfo.currentPos) {
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(CENTER.x, CENTER.y);
        let dragAngleWidth = (schedules[draggedInfo.index].duration / 24) * Math.PI * 2;
        let mouseAngle = Math.atan2(draggedInfo.currentPos.y - CENTER.y, draggedInfo.currentPos.x - CENTER.x);
        ctx.arc(CENTER.x, CENTER.y, RADIUS * 0.9, mouseAngle - dragAngleWidth/2, mouseAngle + dragAngleWidth/2);
        ctx.closePath();
        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 4;
        ctx.stroke();
        
        ctx.fillStyle = '#000';
        ctx.font = 'bold 22px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText("🚚 " + schedules[draggedInfo.index].name, draggedInfo.currentPos.x, draggedInfo.currentPos.y - 20);
        ctx.restore();
    }

    // 2. 外側の時間文字盤の描画
    ctx.font = 'bold 28px sans-serif';
    ctx.fillStyle = '#4a3c31';
    for (let h = 1; h <= 24; h++) {
        let angle = BASE_ANGLE + (h / 24) * Math.PI * 2;
        let displayNum = h % 12 === 0 ? 12 : h % 12;
        let textRadius = RADIUS + 35;
        let x = CENTER.x + Math.cos(angle) * textRadius;
        let y = CENTER.y + Math.sin(angle) * textRadius;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(displayNum, x, y);

        let x1 = CENTER.x + Math.cos(angle) * RADIUS;
        let y1 = CENTER.y + Math.sin(angle) * RADIUS;
        let x2 = CENTER.x + Math.cos(angle) * (RADIUS + 12);
        let y2 = CENTER.y + Math.sin(angle) * (RADIUS + 12);
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.strokeStyle = '#4a3c31';
        ctx.lineWidth = 3;
        ctx.stroke();
    }

    // 3. 中央の丸窓
    ctx.save();
    ctx.beginPath();
    ctx.arc(CENTER.x, CENTER.y, RADIUS * 0.36, 0, Math.PI * 2);
    ctx.closePath();
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.lineWidth = 6;
    ctx.strokeStyle = '#cca625'; 
    ctx.stroke();
    ctx.clip();
    ctx.fillStyle = '#7a736d'; 
    ctx.fillRect(CENTER.x - 150, CENTER.y - 150, 300, 150);
    ctx.fillStyle = '#eae0cb'; 
    ctx.fillRect(CENTER.x - 150, CENTER.y, 300, 150);
    ctx.font = '42px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🌙', CENTER.x - 25, CENTER.y - 40); 
    ctx.fillText('☀️', CENTER.x + 25, CENTER.y + 40);  
    ctx.restore();
}

// --- 操作・ドラッグ＆ドロップロジック ---
let dragMode = null; // 'resize' または 'move'
let pendingDragMode = null; // 長押し判定中に一時キープするモード
let dragIndex = -1; 
let longPressTimer = null;
let lastTapTime = 0;
let lastMousePos = { x: 0, y: 0 };

function getCanvasCoords(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

function getHourFromCoords(x, y) {
    let dx = x - CENTER.x;
    let dy = y - CENTER.y;
    let angle = Math.atan2(dy, dx) - BASE_ANGLE;
    while (angle < 0) angle += Math.PI * 2;
    while (angle >= Math.PI * 2) angle -= Math.PI * 2;
    return (angle / (Math.PI * 2)) * 24;
}

function getScheduleIndexByHour(targetHour) {
    let currentHour = startHourOffset;
    for (let i = 0; i < schedules.length; i++) {
        let start = currentHour % 24;
        let end = (currentHour + schedules[i].duration) % 24;
        if (start < end) {
            if (targetHour >= start && targetHour < end) return i;
        } else {
            if (targetHour >= start || targetHour < end) return i;
        }
        currentHour += schedules[i].duration;
    }
    return schedules.length - 1;
}

function handleStart(clientX, clientY) {
    const coords = getCanvasCoords(clientX, clientY);
    const dist = Math.sqrt((coords.x - CENTER.x)**2 + (coords.y - CENTER.y)**2);
    if (dist > RADIUS + 60 || dist < RADIUS * 0.2) return;

    const clickHour = getHourFromCoords(coords.x, coords.y);
    lastMousePos = coords;
    
    // ダブルタップ（追加）
    const now = Date.now();
    if (now - lastTapTime < 300) {
        clearTimeout(longPressTimer); longPressTimer = null;
        let idx = getScheduleIndexByHour(clickHour);
        let newName = prompt("あたらしく追加する項目はなに？", "あさごはん");
        if (newName) {
            if (schedules[idx].duration > 0.5) {
                schedules[idx].duration -= 0.5;
                schedules.splice(idx + 1, 0, { name: newName, duration: 0.5, color: '#e57373' });
                draw();
            } else { alert("時間がみじかすぎて追加できません"); }
        }
        lastTapTime = now; return;
    }
    lastTapTime = now;

    // 長押し（削除）の準備
    let targetIdx = getScheduleIndexByHour(clickHour);
    if (longPressTimer) clearTimeout(longPressTimer);
    
    let currentHour = startHourOffset;
    let hitBoundary = false;
    for (let i = 0; i < schedules.length; i++) {
        currentHour += schedules[i].duration;
        let diff = Math.abs(clickHour - (currentHour % 24));
        if (diff > 12) diff = 24 - diff; 

        if (diff < 0.6) { 
            pendingDragMode = 'resize';
            dragIndex = i;
            hitBoundary = true;
            break;
        }
    }
    if (!hitBoundary) {
        pendingDragMode = 'move';
        dragIndex = targetIdx;
    }

    longPressTimer = setTimeout(() => {
        if (!dragMode && schedules.length > 1) {
            if (confirm(`「${schedules[targetIdx].name}」を消しますか？`)) {
                let deletedDuration = schedules[targetIdx].duration;
                if (targetIdx === 0) startHourOffset = (startHourOffset + deletedDuration) % 24;
                schedules.splice(targetIdx, 1);
                schedules[targetIdx % schedules.length].duration += deletedDuration;
                
                pendingDragMode = null;
                dragIndex = -1;
                draw();
            }
        }
        longPressTimer = null;
    }, 1000);
}

function handleMove(clientX, clientY) {
    if (!pendingDragMode || dragIndex === -1) return;

    const coords = getCanvasCoords(clientX, clientY);
    
    // わずかでも動いたら長押しを解除し、ドラッグモードに移行
    const moveDist = Math.sqrt((coords.x - lastMousePos.x)**2 + (coords.y - lastMousePos.y)**2);
    if (moveDist > 3 && !dragMode) {
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
        dragMode = pendingDragMode;
    }

    if (!dragMode) return; 

    const currentHour = getHourFromCoords(coords.x, coords.y);
    lastMousePos = coords;

    if (dragMode === 'resize') {
        let scheduledStartHour = startHourOffset;
        for (let i = 0; i < dragIndex; i++) { scheduledStartHour += schedules[i].duration; }
        scheduledStartHour = scheduledStartHour % 24;

        let nextIndex = (dragIndex + 1) % schedules.length;
        let totalTwoDuration = schedules[dragIndex].duration + schedules[nextIndex].duration;
        let newDuration = currentHour - scheduledStartHour;
        while (newDuration < 0) newDuration += 24;

        if (newDuration > 0.1 && newDuration < totalTwoDuration - 0.1) {
            let roundedDuration = Math.round(newDuration * 4) / 4;
            if (dragIndex === schedules.length - 1) {
                startHourOffset = (startHourOffset + (roundedDuration - schedules[dragIndex].duration)) % 24;
                if (startHourOffset < 0) startHourOffset += 24;
            }
            schedules[dragIndex].duration = roundedDuration;
            schedules[nextIndex].duration = Math.round((totalTwoDuration - roundedDuration) * 4) / 4;
            draw();
        }
    } else if (dragMode === 'move') {
        draw({ type: 'move', index: dragIndex, currentPos: coords });
    }
}

function handleEnd(clientX, clientY) {
    if (dragMode === 'move' && dragIndex !== -1) {
        const clickHour = getHourFromCoords(lastMousePos.x, lastMousePos.y);
        let dropIndex = getScheduleIndexByHour(clickHour);

        if (dropIndex !== dragIndex) {
            const targetItem = schedules.splice(dragIndex, 1)[0];
            if (dragIndex === 0) {
                startHourOffset = (startHourOffset + targetItem.duration) % 24;
            }
            schedules.splice(dropIndex, 0, targetItem);
            if (dropIndex === 0) {
                startHourOffset = (startHourOffset - targetItem.duration + 24) % 24;
            }
        }
    }

    dragMode = null;
    pendingDragMode = null;
    dragIndex = -1;
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    draw();
}

// イベント登録
canvas.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
window.addEventListener('mouseup', (e) => handleEnd(e.clientX, e.clientY));

canvas.addEventListener('touchstart', (e) => {
    if(e.touches.length === 1) handleStart(e.touches[0].clientX, e.touches[0].clientY);
});
canvas.addEventListener('touchmove', (e) => {
    if(e.touches.length === 1) handleMove(e.touches[0].clientX, e.touches[0].clientY);
});
canvas.addEventListener('touchend', (e) => {
    if(e.changedTouches.length === 1) handleEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
});
</script></body>
</html>
